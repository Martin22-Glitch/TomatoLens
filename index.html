<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>云盘以图搜图</title>
<style>
 :root{
  --bg:#f8fafc; --surface:#ffffff; --line:#e2e8f0; --line2:#cbd5e1;
  --text:#1e293b; --mut:#64748b; --soft:#94a3b8;
  --accent:#6366f1; --accent-h:#4f46e5; --accent-bg:#eef2ff;
  --ok:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --radius:12px; --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
 }
 *{box-sizing:border-box}
 body{margin:0;font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif;
      background:var(--bg);color:var(--text);font-size:14px}
 header{background:var(--surface);border-bottom:1px solid var(--line);
        padding:16px 32px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
 header h1{font-size:17px;margin:0;font-weight:600}
 .stat{margin-left:auto;color:var(--mut);font-size:13px;
       background:var(--accent-bg);color:var(--accent-h);padding:5px 12px;border-radius:20px}
 .wrap{max-width:1180px;margin:0 auto;padding:28px 32px;display:grid;
       grid-template-columns:280px 1fr;gap:24px;align-items:start}
 @media(max-width:880px){.wrap{grid-template-columns:1fr}}
 .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
        padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
 .panel h2{font-size:14px;margin:0 0 16px;font-weight:600;color:var(--text);
           display:flex;align-items:center;gap:8px}
 .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
 button{background:var(--accent);color:#fff;border:0;padding:9px 16px;border-radius:9px;
        cursor:pointer;font-size:13px;font-weight:500;transition:.15s;font-family:inherit}
 button:hover{background:var(--accent-h)} button:disabled{opacity:.45;cursor:not-allowed}
 button.ghost{background:var(--surface);border:1px solid var(--line2);color:var(--text)}
 button.ghost:hover{background:#f1f5f9;border-color:var(--soft)}
 button.danger{background:var(--danger)} button.danger:hover{filter:brightness(.92)}
 input[type=text]{background:var(--bg);border:1px solid var(--line2);color:var(--text);
   padding:9px 12px;border-radius:9px;font-size:13px;flex:1;min-width:200px;font-family:inherit}
 input[type=text]:focus{outline:0;border-color:var(--accent);background:#fff}
 input[type=file]{font-size:13px;color:var(--mut)}
 select{padding:9px 10px;border-radius:9px;border:1px solid var(--line2);background:var(--bg);
        color:var(--text);font-size:13px}
 .hint{color:var(--mut);font-size:12px;margin-top:10px;line-height:1.6}
 /* 文件夹树 */
 .tree{font-size:13px;max-height:60vh;overflow:auto;margin-top:4px}
 .node{user-select:none}
 .node-row{display:flex;align-items:flex-start;gap:4px;padding:4px 6px;border-radius:6px;cursor:pointer}
 .node-row:hover{background:var(--accent-bg)}
 .toggle{width:16px;text-align:center;color:var(--soft);font-weight:700;flex:none}
 .nm{color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .nm:hover{color:var(--accent-h)}
 .children{margin-left:14px;border-left:1px dashed var(--line2);padding-left:4px}
 .ldg{color:var(--soft);font-size:12px;padding:4px 8px}
 /* 可换行的路径文本（去重/关键词结果用）*/
 .wrap-path{flex:1;color:var(--text);word-break:break-all;white-space:normal;line-height:1.5}
 .wrap-sub{color:var(--soft);font-size:11px;word-break:break-all;white-space:normal;line-height:1.5;margin-top:2px}
 .result-row{display:flex;align-items:flex-start;gap:8px;padding:6px;border-radius:6px}
 .result-row:hover{background:var(--accent-bg)}
 /* 结果网格 */
 #log{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:12px;
   font-family:Consolas,monospace;font-size:12px;color:var(--mut);min-height:44px;
   white-space:pre-wrap;line-height:1.7;margin-top:14px}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:18px}
 @media(max-width:880px){.grid{grid-template-columns:repeat(2,1fr)}}
 .card{background:var(--surface);border:1px solid var(--line);border-radius:10px;
   overflow:hidden;transition:.15s}
 .card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
 .card img{width:100%;height:140px;object-fit:cover;background:#f1f5f9;cursor:pointer;display:block}
 .meta{padding:8px 10px;font-size:11px}
 .badge{display:inline-block;padding:2px 7px;border-radius:5px;font-weight:600;font-size:10px}
 .b-same{background:#fef2f2;color:var(--danger)}
 .b-maybe{background:#fffbeb;color:var(--warn)}
 .b-sim{background:#f1f5f9;color:var(--soft)}
 .b-keep{background:#ecfdf5;color:var(--ok)}
 .path{color:var(--mut);word-break:break-all;margin-top:5px;line-height:1.5}
 .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line2);
   border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;
   vertical-align:-2px;margin-right:6px}
 @keyframes s{to{transform:rotate(360deg)}}
 /* 弹窗 */
 .mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;
   align-items:center;justify-content:center;z-index:50}
 .mask.show{display:flex}
 .dialog{background:#fff;border-radius:14px;padding:24px;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
 .dialog h3{margin:0 0 10px;font-size:16px}
 .dialog p{color:var(--mut);font-size:13px;line-height:1.7;margin:0 0 20px;word-break:break-all}
 .dialog .row{justify-content:flex-end}
</style>
</head>
<body>
<header>
<div style="text-align:center; margin:24px 0 16px;">
  <h1 style="font-size:38px; font-weight:700; margin:0; letter-spacing:1px;">
    🍅 TomatoLens
  </h1>
  <p style="font-size:14px; color:var(--mut); margin:6px 0 0;">
    pikpak以图搜图 · by Littomato
  </p>
</div>
 <span class="stat" id="stat">库内 — 张</span>
 <span id="loginBox" style="display:flex;gap:8px;align-items:center;margin-left:12px">
  <span id="loginState" style="font-size:12px;color:var(--mut)"></span>
  <button class="ghost" id="loginBtn" onclick="showLogin()" style="padding:5px 12px;font-size:12px">登录</button>
  <button class="ghost" id="logoutBtn" onclick="doLogout()" style="padding:5px 12px;font-size:12px;display:none">登出</button>
 </span>
</header>

<div class="wrap">
 <div>
  <div class="panel">
   <h2>📂 网盘文件夹</h2>
   <div class="tree" id="tree"><div class="ldg"><span class="spin"></span>加载中...</div></div>
   <div class="hint">点击文件夹名 → 自动填入下方输入框</div>
  </div>
 </div>

 <div>
  <div class="panel">
   <h2>🖼️ 以图搜图</h2>
   <div class="row">
    <input type="file" id="searchFile" accept="image/*">
    <select id="groups">
     <option value="1">1组(5张)</option>
     <option value="2" selected>2组(10张)</option>
     <option value="3">3组(15张)</option>
     <option value="4">4组(20张)</option>
     <option value="5">5组(25张)</option>
    </select>
    <button onclick="doSearch()">查询</button>
   </div>
   <div class="hint" id="searchHint"></div>
   <div class="grid" id="results"></div>
  </div>

  <div class="panel">
   <h2>🔤 关键词搜索（文件夹 / 文件名）</h2>
   <div class="row">
    <input type="text" id="kwInput" placeholder="多词用空格分隔=同时满足；前缀 - 表示排除，如：晚饭 好吃 -视频"
           onkeydown="if(event.key==='Enter')doKeyword(1)">
    <button onclick="doKeyword(1)">搜索</button>
   </div>
   <div class="hint">空格分隔的多个词需<b>全部命中</b>；<b>-词</b> 表示排除该词。例：<code>风景 海边 -缩略图</code></div>
   <div class="hint" id="kwHint"></div>
   <div id="kwFolders"></div>
   <div id="kwFiles"></div>
   <div class="row" id="kwPager" style="justify-content:center;margin-top:12px;display:none">
    <button class="ghost" onclick="kwPage(-1)">上一页</button>
    <span id="kwPageInfo" style="align-self:center;color:var(--mut)"></span>
    <button class="ghost" onclick="kwPage(1)">下一页</button>
   </div>
  </div>

  <div class="panel">
   <h2>🧹 文件夹去重检测</h2>
   <div class="row">
    <input type="text" id="dedupScope" placeholder="留空=全盘两两查重；或填一个文件夹路径(用 / 分隔)，全盘找它的重复项">
    <button onclick="doDedup()">开始检测</button>
   </div>
   <div class="hint">留空：检测全盘所有重复文件夹组。<br>填路径(如 <code>分类/好吃的/晚饭/总</code>)：拿该文件夹与全盘比对，找出与它内容重复的文件夹（子集/超集都算）。</div>
   <div id="dedupResult"></div>
  </div>

  <div class="panel">
   <h2>⚙️ 建库 / 更新</h2>
   <div class="row" style="margin-bottom:12px">
    <button onclick="confirmFullSync()">🌐 全盘同步</button>
    <button class="ghost" onclick="reloadIndex()">🔄 重新加载索引</button>
    <button class="danger" id="cancelBtn" onclick="cancelSync()" disabled>⏸ 暂停/结束</button>
   </div>
   <div class="row">
    <input type="text" id="folderInput" placeholder="文件夹路径，层级用 / 分隔，如：Photos/2024/Travel">
    <button onclick="confirmFolderSync()">📁 索引此文件夹</button>
   </div>
   <div class="hint">全盘同步遍历整个网盘（较慢，用于定期对账修正）；指定文件夹用于日常快速增量。</div>
   <div id="log">就绪。</div>
  </div>
 </div>
</div>

<div class="mask" id="mask">
 <div class="dialog">
  <h3 id="dlgTitle">确认操作</h3>
  <p id="dlgMsg"></p>
  <div class="row">
   <button class="ghost" onclick="closeDlg()">取消</button>
   <button onclick="dlgOk()">确认</button>
  </div>
 </div>
</div>

<script>
let polling=null, dlgAction=null;

function esc(s){return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function refreshStat(){
 const d=await (await fetch('/api/stat')).json();
 document.getElementById('stat').textContent=`库内 ${d.total} 张`;
}

/* ---------- 文件夹树 ---------- */
async function loadChildren(parentId, container){
 container.innerHTML='<div class="ldg"><span class="spin"></span>加载中...</div>';
 const url='/api/subfolders'+(parentId?('?parent_id='+encodeURIComponent(parentId)):'');
 const d=await (await fetch(url)).json();
 container.innerHTML='';
 if(d.error){container.innerHTML='<div class="ldg">⚠️ '+esc(d.error)+'</div>';return;}
 if(!d.folders.length){container.innerHTML='<div class="ldg">（无子文件夹）</div>';return;}
 d.folders.forEach(fo=>container.appendChild(makeNode(fo)));
}
function makeNode(fo){
 const node=document.createElement('div'); node.className='node';
 const row=document.createElement('div'); row.className='node-row';
 const tog=document.createElement('span'); tog.className='toggle';
 tog.textContent=fo.has_child?'+':'';
 const nm=document.createElement('span'); nm.className='nm'; nm.textContent='📁 '+fo.name;
 const kids=document.createElement('div'); kids.className='children'; kids.style.display='none';
 let loaded=false;
 nm.onclick=(e)=>{
  e.stopPropagation();
  document.getElementById('folderInput').value=buildPath(node);
 };
 if(fo.has_child){
  row.onclick=async()=>{
   if(kids.style.display==='none'){
    kids.style.display='block'; tog.textContent='−';
    if(!loaded){ await loadChildren(fo.id, kids); loaded=true; }
   }else{ kids.style.display='none'; tog.textContent='+'; }
  };
 }
 node.dataset.name=fo.name;
 row.appendChild(tog); row.appendChild(nm);
 node.appendChild(row); node.appendChild(kids);
 return node;
}
function buildPath(node){
 const parts=[]; let cur=node;
 while(cur && cur.classList && cur.classList.contains('node')){
  parts.unshift(cur.dataset.name);
  cur=cur.parentElement.closest('.node');
 }
 return parts.join('/');   // 统一用 / 分隔
}

/* ---------- 搜图 ---------- */
async function doSearch(){
 const f=document.getElementById('searchFile').files[0];
 if(!f){toast('请先选择图片');return;}
 const hint=document.getElementById('searchHint');
 hint.innerHTML='<span class="spin"></span>检索中...';
 const fd=new FormData(); fd.append('image',f);
 fd.append('groups',document.getElementById('groups').value);
 const d=await (await fetch('/api/search',{method:'POST',body:fd})).json();
 hint.textContent=`查询耗时 ${d.elapsed.toFixed(3)} 秒 · 共 ${d.results.length} 张`;
 const g=document.getElementById('results'); g.innerHTML='';
 d.results.forEach(c=>{
  const bc=c.verdict.includes('同图')?'b-same':(c.verdict=='疑似'?'b-maybe':'b-sim');
  g.innerHTML+=`<div class="card">
   <img src="/thumb/${c.fid_str}" loading="lazy" onerror="this.style.opacity=.3"
        onclick="window.open('/thumb/${c.fid_str}')">
   <div class="meta"><span class="badge ${bc}">${esc(c.verdict)}</span>
    <span style="color:var(--soft)"> 内点${c.orb}</span>
    <div class="path">${esc(c.path)}</div></div></div>`;
 });
}

/* ---------- 同步 ---------- */
function showDlg(title,msg,action){
 document.getElementById('dlgTitle').textContent=title;
 document.getElementById('dlgMsg').textContent=msg;
 dlgAction=action; document.getElementById('mask').classList.add('show');
}
function closeDlg(){document.getElementById('mask').classList.remove('show');dlgAction=null;}
function dlgOk(){const a=dlgAction;closeDlg();if(a)a();}
function confirmFullSync(){
 showDlg('确认全盘同步','将遍历整个网盘进行对账（新增/更新/删除），耗时可能较长。确定开始吗？',
  ()=>startSync(''));
}
function confirmFolderSync(){
 const v=document.getElementById('folderInput').value.trim();
 if(!v){toast('请先选择或输入文件夹');return;}
 showDlg('确认索引文件夹','将索引文件夹「'+v.replace(/\//g,' / ')+'」，仅新增/更新，不删除其他记录。确定吗？',
  ()=>startSync(v));
}
async function startSync(path){
 const log=document.getElementById('log');
 log.innerHTML='<span class="spin"></span>正在启动...';
 const d=await (await fetch('/api/sync',{method:'POST',
   headers:{'Content-Type':'application/json'},body:JSON.stringify({path})})).json();
 if(d.error){log.textContent='⚠️ '+d.error;return;}
 document.getElementById('cancelBtn').disabled=false;
 if(polling)clearInterval(polling);
 polling=setInterval(pollProgress,1000);
}
async function cancelSync(){
 await fetch('/api/sync_cancel',{method:'POST'});
 document.getElementById('log').innerHTML='<span class="spin"></span>正在停止（当前批次完成后停止）...';
}
async function pollProgress(){
 const p=await (await fetch('/api/sync_status')).json();
 const log=document.getElementById('log');
 if(p.running){
  log.innerHTML=`<span class="spin"></span>[${esc(p.stage||'...')}] 扫描 ${p.seen||0} · 新增 ${p.added||0} · 更新 ${p.updated||0} · 删除 ${p.deleted||0} · 失败 ${p.failed||0}\n${esc(p.msg||'')}`;
 }else{
  clearInterval(polling);polling=null;
  document.getElementById('cancelBtn').disabled=true;
  const l=p.last;
  if(l&&l.error){log.textContent='⚠️ 出错: '+l.error;}
  else if(l&&l.cancelled){log.textContent='⏸ 已停止（已处理部分已保存）· 库内 '+l.total+' 张';}
  else if(l){log.textContent=`✅ 完成！扫描 ${l.seen} · 新增 ${l.added} · 更新 ${l.updated} · 删除 ${l.deleted} · 失败 ${l.failed} · 耗时 ${l.elapsed}s · 库内 ${l.total} 张`;}
  else{log.textContent='就绪。';}
  refreshStat();
 }
}
async function reloadIndex(){
 await fetch('/api/reload',{method:'POST'});
 document.getElementById('log').textContent='🔄 索引已重新加载。'; refreshStat();
}
function toast(m){document.getElementById('log').textContent='ℹ️ '+m;}

/* ---------- 登录 ---------- */
async function refreshLogin(){
 const d=await (await fetch('/api/login_status')).json();
 document.getElementById('loginState').textContent=d.logged_in?'已登录':'未登录';
 document.getElementById('loginBtn').style.display=d.logged_in?'none':'inline-block';
 document.getElementById('logoutBtn').style.display=d.logged_in?'inline-block':'none';
}
function showLogin(){const pwd=prompt('请输入 PikPak 密码');if(!pwd)return;doLogin(pwd);}
async function doLogin(pwd){
 document.getElementById('log').innerHTML='<span class="spin"></span>登录中...';
 const d=await (await fetch('/api/login',{method:'POST',
   headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})})).json();
 document.getElementById('log').textContent=(d.ok?'✅ ':'⚠️ ')+d.msg; refreshLogin();
}
async function doLogout(){
 const d=await (await fetch('/api/logout',{method:'POST'})).json();
 document.getElementById('log').textContent=(d.ok?'✅ ':'⚠️ ')+d.msg; refreshLogin();
}

/* ---------- 关键词搜索 ---------- */
let kwState={q:"",page:1,pages:1};
async function doKeyword(page){
 const q=document.getElementById('kwInput').value.trim();
 if(!q){toast('请输入关键词');return;}
 kwState.q=q; kwState.page=page;
 document.getElementById('kwHint').innerHTML='<span class="spin"></span>搜索中...';
 const d=await (await fetch('/api/keyword?q='+encodeURIComponent(q)+'&page='+page)).json();
 kwState.pages=d.pages;
 document.getElementById('kwHint').textContent=`文件夹 ${d.folders.length} 个 · 文件 ${d.total} 个`;
 const fdiv=document.getElementById('kwFolders'); fdiv.innerHTML='';
 if(d.folders.length){
  fdiv.innerHTML='<div style="margin:10px 0 6px;font-weight:600">📂 匹配的文件夹</div>'+
   d.folders.map(f=>`<div class="result-row" style="cursor:pointer"
     onclick="document.getElementById('folderInput').value='${esc(f.path.replace(/\/$/,''))}';document.getElementById('dedupScope').value='${esc(f.path.replace(/\/$/,''))}'">
    <span class="wrap-path">📁 ${esc(f.path)}</span>
    <span style="color:var(--soft);flex:none">${f.count}张</span></div>`).join('');
 }
 const xdiv=document.getElementById('kwFiles'); xdiv.innerHTML='';
 if(d.files.length){
  xdiv.innerHTML='<div style="margin:14px 0 6px;font-weight:600">🖼️ 匹配的文件</div>'+
   d.files.map(c=>`<div class="result-row">
    <img src="/thumb/${c.fid_str}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;flex:none" onerror="this.style.opacity=.2">
    <div style="flex:1"><div class="wrap-path">${esc(c.name)}</div>
     <div class="wrap-sub">${esc(c.path)}</div></div></div>`).join('');
 }
 const pg=document.getElementById('kwPager');
 if(d.pages>1){pg.style.display='flex';
   document.getElementById('kwPageInfo').textContent=`第 ${d.page}/${d.pages} 页`;}
 else pg.style.display='none';
}
function kwPage(delta){
 const np=kwState.page+delta;
 if(np<1||np>kwState.pages)return;
 doKeyword(np);
}

/* ---------- 去重 ---------- */
async function doDedup(){
 const scope=document.getElementById('dedupScope').value.trim();
 const r=document.getElementById('dedupResult');
 r.innerHTML='<div class="ldg"><span class="spin"></span>检测中，文件多时请耐心等待...</div>';
 const d=await (await fetch('/api/dedup',{method:'POST',
   headers:{'Content-Type':'application/json'},body:JSON.stringify({scope})})).json();
 if(!d.ok){r.innerHTML='⚠️ '+esc(d.msg||'检测失败');return;}

 if(d.mode==='single'){
  // 单文件夹模式
  if(!d.found){
   r.innerHTML='<div class="ldg">✅ 全盘未发现与「'+esc(d.target.path)+'」重复的文件夹</div>';return;
  }
  r.innerHTML='<div style="margin:10px 0;font-weight:600">目标文件夹：</div>'+
   `<div class="result-row"><span class="badge b-keep">目标</span>
     <span class="wrap-path">${esc(d.target.path)}</span>
     <span style="color:var(--soft);flex:none">${d.target.count}张</span></div>`+
   '<div style="margin:12px 0 6px;font-weight:600">发现 '+d.matches.length+' 个重复文件夹：</div>'+
   d.matches.map(m=>`<div class="result-row">
     <span class="badge b-same" style="flex:none">${esc(m.relation)}</span>
     <div style="flex:1"><div class="wrap-path">${esc(m.path)}</div>
      <div class="wrap-sub">共有${m.inter}张 · 重叠${(m.overlap*100).toFixed(0)}% · 该文件夹${m.count}张</div></div>
     </div>`).join('');
  return;
 }

 // 全盘模式
 if(!d.count){r.innerHTML='<div class="ldg">✅ 未发现重复文件夹</div>';return;}
 r.innerHTML='<div style="margin:10px 0;font-weight:600">发现 '+d.count+' 组重复：</div>'+
  d.groups.map((g,i)=>'<div class="panel" style="margin:8px 0;padding:12px">'+
   '<div style="font-weight:600;margin-bottom:6px">第 '+(i+1)+' 组</div>'+
   g.map(m=>`<div class="result-row">
     <span class="badge ${m.role==='keep'?'b-keep':'b-same'}" style="flex:none">${m.role==='keep'?'建议保留':'建议清理'}</span>
